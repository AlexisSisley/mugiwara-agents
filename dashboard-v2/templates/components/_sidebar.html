{% load static %}
<aside class="glass-sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-logo">&#9813;</span>
        <span class="sidebar-title">Mugiwara</span>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'overview' %}"
           class="sidebar-link{% if active_page == 'overview' %} active{% endif %}"
           aria-current="{% if active_page == 'overview' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span class="sidebar-link-text">Overview</span>
        </a>

        <a href="{% url 'crew_list' %}"
           class="sidebar-link{% if active_page == 'crew' %} active{% endif %}"
           aria-current="{% if active_page == 'crew' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="sidebar-link-text">Crew</span>
        </a>

        <a href="{% url 'orchestrator_index' %}"
           class="sidebar-link{% if active_page == 'orchestrator' %} active{% endif %}"
           aria-current="{% if active_page == 'orchestrator' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
            <span class="sidebar-link-text">Orchestrator</span>
        </a>

        <a href="{% url 'pipeline_list' %}"
           class="sidebar-link{% if active_page == 'pipelines' %} active{% endif %}"
           aria-current="{% if active_page == 'pipelines' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span class="sidebar-link-text">Pipelines</span>
        </a>

        <a href="{% url 'project_list' %}"
           class="sidebar-link{% if active_page == 'projects' %} active{% endif %}"
           aria-current="{% if active_page == 'projects' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="sidebar-link-text">Projects</span>
        </a>

        <a href="{% url 'report_list' %}"
           class="sidebar-link{% if active_page == 'reports' %} active{% endif %}"
           aria-current="{% if active_page == 'reports' %}page{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span class="sidebar-link-text">Reports</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <span class="sidebar-version">v2.0</span>
    </div>
</aside>
