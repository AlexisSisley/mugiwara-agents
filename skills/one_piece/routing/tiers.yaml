# ============================================================
# Mugiwara Agents — Model Tier Assignment
# Defines which model each agent/pipeline uses
# ============================================================
version: 2

# Tier 0 — opus : Routage complexe, orchestration multi-agents
tier_0:
  model: opus
  description: "Routage complexe, orchestration multi-agents"
  agents:
    - one_piece
  pipelines:
    - incident
    - discovery
    - mugiwara
    - pre-launch
    - onboard
    - modernize
    - doc-hunt
    - api-postman

# Tier 1 — opus : Raisonnement profond, architecture, securite
tier_1:
  model: opus
  description: "Raisonnement profond, architecture, securite, subagents eleves"
  subagents:
    - chopper
    - franky
    - nami
    - jinbe
    - robin
    - zorro
    - sanji
    - luffy
    - brook
    - usopp
    - vivi
  skills:
