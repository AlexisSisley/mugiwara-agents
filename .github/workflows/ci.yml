# ============================================================
# Mugiwara Agents - CI Pipeline
# ============================================================
# Runs all test suites on every push to main and pull request.
# 16 parallel jobs: smoke tests, functional tests (dry-run),
# hooks tests, plugin system tests, monitoring, feature-flags,
# dashboard, docker, iis, firebase, infra-reseau,
# big-mom, hawkins, magellan, caesar, aokiji.
#
# No secrets or API keys required — all tests run offline.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Smoke Tests (structural) ───────────────────────
  smoke-tests:
    name: Smoke Tests (structural)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run structural smoke tests
        run: |
          chmod +x tests/test_structural.sh
          bash tests/test_structural.sh

  # ── Job 2: Functional Tests (dry-run) ─────────────────────
  functional-tests:
    name: Functional Tests (dry-run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run functional tests in dry-run mode
        run: |
          chmod +x tests/functional/run-functional-tests.sh
          bash tests/functional/run-functional-tests.sh --dry-run

  # ── Job 3: Hooks Tests ────────────────────────────────────
  hooks-tests:
    name: Hooks Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run hooks tests
        run: |
          chmod +x tests/hooks/test-hooks.sh
          bash tests/hooks/test-hooks.sh

  # ── Job 4: Plugin System Tests ──────────────────────────────
  plugin-tests:
    name: Plugin System Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run plugin system tests
        run: |
          chmod +x tests/plugin/test_cli.sh
          chmod +x bin/mugiwara
          bash tests/plugin/test_cli.sh

  # ── Job 5: Monitoring Agent Tests ──────────────────────────────
  monitoring-tests:
    name: Monitoring Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run monitoring agent tests
        run: |
          chmod +x tests/monitoring/test_monitoring.sh
          bash tests/monitoring/test_monitoring.sh

  # ── Job 6: Feature Flags Agent Tests ───────────────────────────
  feature-flags-tests:
    name: Feature Flags Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run feature flags agent tests
        run: |
          chmod +x tests/feature-flags/test_feature_flags.sh
          bash tests/feature-flags/test_feature_flags.sh

  # ── Job 7: Dashboard Tests ──────────────────────────────────
  dashboard-tests:
    name: Dashboard Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check (server)
        working-directory: dashboard
        run: npx tsc --noEmit -p tsconfig.server.json

      - name: Type check (frontend)
        working-directory: dashboard
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Run tests with coverage
        working-directory: dashboard
        run: npx vitest run --coverage

      - name: Build frontend
        working-directory: dashboard
        run: npx vite build

  # ── Job 8: Docker Agent Tests ──────────────────────────────
  docker-tests:
    name: Docker Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker agent tests
        run: |
          chmod +x tests/docker/test_docker.sh
          bash tests/docker/test_docker.sh

  # ── Job 9: IIS Agent Tests ────────────────────────────────
  iis-tests:
    name: IIS Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run IIS agent tests
        run: |
          chmod +x tests/iis/test_iis.sh
          bash tests/iis/test_iis.sh

  # ── Job 10: Firebase Agent Tests ──────────────────────────
  firebase-tests:
    name: Firebase Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Firebase agent tests
        run: |
          chmod +x tests/firebase/test_firebase.sh
          bash tests/firebase/test_firebase.sh

  # ── Job 11: Infrastructure Reseau Agent Tests ─────────────
  infra-reseau-tests:
    name: Infra Reseau Agent Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run infra-reseau agent tests
        run: |
